image: alpine:latest

stages:
  - deploy
  - pages

variables:
  ADDON_ID: "plugin.video.rmskodi"
  REPO_ID: "repository.rmskodi"
  PAGES_BASE: "https://artempl.gitlab.io/rumotosport-kodi-plugin"
  RELEASE_CLI_VERSION: v0.24.0

.before_script_common: &before_script_common
  - apk add --no-cache zip curl
  - |
    curl -sL "https://gitlab.com/api/v4/projects/16573099/packages/generic/release-cli/${RELEASE_CLI_VERSION}/release-cli-linux-amd64" \
      -o /usr/local/bin/release-cli && chmod +x /usr/local/bin/release-cli

release:
  stage: deploy
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "web"
  before_script:
    - *before_script_common
  script:
    - zip -r "${ADDON_ID}.zip" "${ADDON_ID}/"
    - cd "${REPO_ID}" && zip -r "../${REPO_ID}.zip" . && cd ..
  release:
    name: "RuMotoSport Kodi $CI_COMMIT_TAG"
    description: "Release $CI_COMMIT_TAG"
    tag_name: "$CI_COMMIT_TAG"
    assets:
      links:
        - name: "${ADDON_ID}.zip"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/jobs/${CI_JOB_ID}/artifacts/${ADDON_ID}.zip"
        - name: "${REPO_ID}.zip"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/jobs/${CI_JOB_ID}/artifacts/${REPO_ID}.zip"
  artifacts:
    paths:
      - "${ADDON_ID}.zip"
      - "${REPO_ID}.zip"

pages:
  stage: pages
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == "main"
  before_script:
    - apk add --no-cache zip
  script:
    # Extract version from addon.xml (only from <addon> tag, skip XML declaration)
    - VERSION=$(sed -n '/<addon/s/.*version="\([^"]*\)".*/\1/p' "${ADDON_ID}/addon.xml")
    - echo "Building repository for ${ADDON_ID} version ${VERSION}"

    # Create versioned addon zip
    - cd "${ADDON_ID}" && zip -r "../${ADDON_ID}-${VERSION}.zip" . && cd ..

    # Build repository index: addons.xml + addons.xml.md5
    # Strip the <?xml?> declaration from the addon to avoid duplication
    - mkdir -p public
    - |
      {
        echo '<?xml version="1.0" encoding="UTF-8"?>'
        echo '<addons>'
        sed '1{/^<?xml/d}' "${ADDON_ID}/addon.xml"
        echo '</addons>'
      } > public/addons.xml
    - md5sum public/addons.xml | cut -d' ' -f1 > public/addons.xml.md5

    # Place versioned addon zip
    - mkdir -p "public/${ADDON_ID}"
    - mv "${ADDON_ID}-${VERSION}.zip" "public/${ADDON_ID}/"

    # Place repository addon zip (for initial install)
    - mkdir -p "public/${REPO_ID}"
    - cd "${REPO_ID}" && zip -r "../public/${REPO_ID}/${REPO_ID}-1.0.0.zip" . && cd ..

    # Debug: show structure
    - find public -type f | sort
  artifacts:
    paths:
      - public
