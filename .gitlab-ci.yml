image: alpine:latest

before_script:
  - apk add --no-cache zip

variables:
  PACKAGE_NAME: "plugin.video.rmskodi"

release:
  stage: deploy
  rules:
    - if: $CI_COMMIT_TAG                 # trigger on git tag push
    - if: $CI_PIPELINE_SOURCE == "web"   # or manual run via GitLab UI
  script:
    - zip -r "${PACKAGE_NAME}.zip" "${PACKAGE_NAME}/"
  release:
    name: "RuMotoSport Kodi $CI_COMMIT_TAG"
    description: "Release $CI_COMMIT_TAG"
    tag_name: "$CI_COMMIT_TAG"
    assets:
      links:
        - name: "${PACKAGE_NAME}.zip"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/jobs/${CI_JOB_ID}/artifacts/${PACKAGE_NAME}.zip"
  artifacts:
    paths:
      - "${PACKAGE_NAME}.zip"
