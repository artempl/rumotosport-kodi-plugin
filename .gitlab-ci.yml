image: alpine:latest

variables:
  PACKAGE_NAME: "plugin.video.rmskodi"
  GITLAB_TOKEN: $CI_JOB_TOKEN   # glab auth via job token

before_script:
  - apk add --no-cache zip curl
  # Install glab CLI (recommended replacement for release-cli)
  - |
    GLAB_VERSION=v1.58.0
    curl -sL "https://gitlab.com/gitlab-org/cli/-/releases/${GLAB_VERSION}/downloads/glab_${GLAB_VERSION#v}_linux_amd64.tar.gz" \
      | tar xz -C /usr/local/bin/ glab

release:
  stage: deploy
  rules:
    - if: $CI_COMMIT_TAG                 # trigger on git tag push
    - if: $CI_PIPELINE_SOURCE == "web"   # or manual run via GitLab UI
  script:
    - zip -r "${PACKAGE_NAME}.zip" "${PACKAGE_NAME}/"
    - |
      glab release create "$CI_COMMIT_TAG" \
        --name "RuMotoSport Kodi $CI_COMMIT_TAG" \
        --notes "Release $CI_COMMIT_TAG" \
        --assets-links "[{\"name\":\"${PACKAGE_NAME}.zip\",\"url\":\"${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/jobs/${CI_JOB_ID}/artifacts/${PACKAGE_NAME}.zip\"}]"
  artifacts:
    paths:
      - "${PACKAGE_NAME}.zip"
