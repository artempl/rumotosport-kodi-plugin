image: alpine:latest

variables:
  PACKAGE_NAME: "plugin.video.rmskodi"
  RELEASE_CLI_VERSION: v0.24.0

before_script:
  - apk add --no-cache zip curl
  - |
    curl -sL "https://gitlab.com/api/v4/projects/16573099/packages/generic/release-cli/${RELEASE_CLI_VERSION}/release-cli-linux-amd64" \
      -o /usr/local/bin/release-cli && chmod +x /usr/local/bin/release-cli

release:
  stage: deploy
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "web"
  script:
    - zip -r "${PACKAGE_NAME}.zip" "${PACKAGE_NAME}/"
  release:
    name: "RuMotoSport Kodi $CI_COMMIT_TAG"
    description: "Release $CI_COMMIT_TAG"
    tag_name: "$CI_COMMIT_TAG"
    assets:
      links:
        - name: "${PACKAGE_NAME}.zip"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/jobs/${CI_JOB_ID}/artifacts/${PACKAGE_NAME}.zip"
  artifacts:
    paths:
      - "${PACKAGE_NAME}.zip"
