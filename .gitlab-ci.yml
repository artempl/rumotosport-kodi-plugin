image: alpine:latest

stages:
  - deploy
  - publish

variables:
  ADDON_ID: "plugin.video.rmskodi"
  REPO_ID: "repository.rmskodi"
  PKG_BASE: "https://gitlab.com/api/v4/projects/${CI_PROJECT_ID}/packages/generic/rmskodi-repo/latest"
  RELEASE_CLI_VERSION: v0.24.0

.before_script_common: &before_script_common
  - apk add --no-cache zip curl
  - |
    curl -sL "https://gitlab.com/api/v4/projects/16573099/packages/generic/release-cli/${RELEASE_CLI_VERSION}/release-cli-linux-amd64" \
      -o /usr/local/bin/release-cli && chmod +x /usr/local/bin/release-cli

# ── GitLab Release (tag/manual trigger) ──────────────────────────────
release:
  stage: deploy
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "web"
  before_script:
    - *before_script_common
  script:
    - zip -r "${ADDON_ID}.zip" "${ADDON_ID}/"
    - zip -r "${REPO_ID}.zip" "${REPO_ID}/"
  release:
    name: "RuMotoSport Kodi $CI_COMMIT_TAG"
    description: "Release $CI_COMMIT_TAG"
    tag_name: "$CI_COMMIT_TAG"
    assets:
      links:
        - name: "${ADDON_ID}.zip"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/jobs/${CI_JOB_ID}/artifacts/${ADDON_ID}.zip"
        - name: "${REPO_ID}.zip"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/jobs/${CI_JOB_ID}/artifacts/${REPO_ID}.zip"
  artifacts:
    paths:
      - "${ADDON_ID}.zip"
      - "${REPO_ID}.zip"

# ── Repository index → Generic Packages (main + tags) ────────────────
publish:
  stage: publish
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == "main"
  before_script:
    - apk add --no-cache zip curl
  script:
    # Extract version from addon.xml
    - VERSION=$(sed -n '/<addon/s/.*version="\([^"]*\)".*/\1/p' "${ADDON_ID}/addon.xml")

    # Create versioned plugin zip (include folder for Kodi compat)
    - zip -r "${ADDON_ID}-${VERSION}.zip" "${ADDON_ID}/"

    # Build addons.xml
    - |
      {
        echo '<?xml version="1.0" encoding="UTF-8"?>'
        echo '<addons>'
        sed '1{/^<?xml/d}' "${ADDON_ID}/addon.xml"
        echo '</addons>'
      } > addons.xml
    - md5sum addons.xml | cut -d' ' -f1 > addons.xml.md5

    # Upload to GitLab Generic Packages Registry
    - 'curl -s --header "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file addons.xml "${PKG_BASE}/addons.xml"'
    - 'curl -s --header "JOB-TOKEN: $CI_JOB_TOKEN" --upload-file addons.xml.md5 "${PKG_BASE}/addons.xml.md5"'
    - |
      curl -s --header "JOB-TOKEN: $CI_JOB_TOKEN" \
        --upload-file "${ADDON_ID}-${VERSION}.zip" \
        "${PKG_BASE}/${ADDON_ID}/${ADDON_ID}-${VERSION}.zip"

    # Smoke test: verify downloads
    - echo "=== Verification ==="
    - curl -sL "${PKG_BASE}/addons.xml" | head -3
    - echo "..."
    - 'curl -sILo /dev/null -w "addons.xml.md5: HTTP %{http_code}\n" "${PKG_BASE}/addons.xml.md5"'
    - 'curl -sILo /dev/null -w "plugin zip: HTTP %{http_code}\n" "${PKG_BASE}/${ADDON_ID}/${ADDON_ID}-${VERSION}.zip"'
